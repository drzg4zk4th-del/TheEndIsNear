<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billini EOFY Sale Begins</title>

<style>
body{
    margin:0;
    background:#000;
    color:#E8C3AE;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.container{
    max-width:1200px;
    padding:20px;
}

h1{
    font-size:80px;
    margin-bottom:20px;
    text-transform:uppercase;
    letter-spacing:5px;
    text-shadow:0 0 20px #ff0000;
}

.subtitle{
    font-size:28px;
    color:white;
    margin-bottom:40px;
}

#countdown{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.time-box{
    background:#111;
    border:5px solid #E8C3AE;
    border-radius:20px;
    padding:25px;
    min-width:180px;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.number{
    font-size:72px;
    font-weight:bold;
}

.label{
    font-size:20px;
    color:#ccc;
    margin-top:10px;
}

.warning{
    margin-top:50px;
    font-size:32px;
    color:white;
}

.footer{
    margin-top:20px;
    font-size:22px;
    color:#999;
}
</style>
</head>

<body>

<div class="container">

<h1>Billini EOFY Sale Begins</h1>
<h3>Warehouse Souls descends into Madness</h3>

<div class="subtitle">
Time Remaining Until Wednesday 6:00 PM
</div>

<div id="countdown">

<div class="time-box">
<div class="number" id="days">0</div>
<div class="label">Days</div>
</div>

<div class="time-box">
<div class="number" id="hours">0</div>
<div class="label">Hours</div>
</div>

<div class="time-box">
<div class="number" id="minutes">0</div>
<div class="label">Minutes</div>
</div>

<div class="time-box">
<div class="number" id="seconds">0</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="warning">
⚠ 30,000 Units • EOFY • Construction Site Basement • OverStocked Main Warehouse • UnderStaffed ⚠
</div>

<div class="footer">
"May God Have Mercy On Our Souls"
</div>

</div>

<script>

// SET TARGET DATE HERE
const targetDate = new Date("2026-06-03T18:00:00+10:00");

function updateClock(){

    const now = new Date();
    const difference = targetDate - now;

   if(difference <= 0){ document.body.innerHTML = ` <div style=" position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden; background:black; "> 
   <iframe src="https://www.youtube.com/embed/3wxWNAM8Cso?autoplay=1&controls=0&start=177&loop=1&playlist=3wxWNAM8Cso" style=" position:absolute; top:0; left:0; width:100%; height:100%; border:none; pointer-events:none; " allow="autoplay" ></iframe> 
   <div style=" position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background:rgba(0,0,0,0.35); color:white; font-family:Arial,sans-serif; z-index:10; "> 
   <h1 style=" font-size:120px; color:red; margin:0; text-shadow:0 0 30px red; "> IT HAS BEGUN </h1>
   <h2 style=" font-size:60px; margin-top:20px; "> EOFY IS LIVE </h2> <div style=" margin-top:40px; font-size:32px; color:#ffcc00; "> ⚠ 30,000 Units ⚠ </div> <div style=" font-size:32px; color:#ffcc00; "> ⚠ 4,000 Accessories ⚠ </div> <div style=" font-size:32px; color:#ffcc00; "> ⚠ 5,000+ Orders ⚠ </div> <div style=" margin-top:50px; font-size:28px; color:#ffffff; "> MAY GOD HAVE MERCY ON OUR SOULS </div> </div> </div> `
       ; 
        return; 
            
        }

    const days = Math.floor(difference / (1000*60*60*24));
    const hours = Math.floor((difference / (1000*60*60)) % 24);
    const minutes = Math.floor((difference / (1000*60)) % 60);
    const seconds = Math.floor((difference / 1000) % 60);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
