<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billini EOFY Death Clock</title>
<style>
body{margin:0;background:#000;color:#E8C3AE;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center}
.container{max-width:1200px;padding:20px;width:100%}
h1{font-size:clamp(36px,8vw,80px);text-shadow:0 0 20px red}
#countdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;max-width:900px;margin:auto}
.box{background:#111;border:4px solid #E8C3AE;border-radius:16px;padding:20px}
.num{font-size:clamp(40px,10vw,72px);font-weight:bold}
button{padding:20px 40px;font-size:28px;background:red;color:#fff;border:none;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>Billini EOFY Sale Begins</h1>
<h3>Warehouse Souls Descend Into Madness</h3>
<div id="countdown">
<div class="box"><div class="num" id="days">0</div>Days</div>
<div class="box"><div class="num" id="hours">0</div>Hours</div>
<div class="box"><div class="num" id="minutes">0</div>Minutes</div>
<div class="box"><div class="num" id="seconds">0</div>Seconds</div>
</div>
</div>

<script>
function nextWednesday6PM(){
  const now = new Date();
  const target = new Date(now);
  const day = now.getDay(); // 0=Sun,3=Wed
  let daysUntil = (3 - day + 7) % 7;
  if(daysUntil === 0 && now.getHours() >= 18){ daysUntil = 7; }
  target.setDate(now.getDate() + daysUntil);
  target.setHours(18,0,0,0);
  return target;
}

const targetDate = nextWednesday6PM();

function apocalypseMode(){
 document.body.innerHTML=`
 <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;color:white;text-align:center;padding:20px">
 <h1 style="font-size:clamp(50px,12vw,140px);color:red">IT HAS BEGUN</h1>
 <button onclick="startApocalypse()">ENTER THE APOCALYPSE</button>
 </div>`;
}

function startApocalypse(){
 document.body.innerHTML=`
 <iframe
 src="https://www.youtube.com/embed/3wxWNAM8Cso?autoplay=1&controls=0&start=177&end=214&loop=1&playlist=3wxWNAM8Cso"
 allow="autoplay; encrypted-media; fullscreen"
 style="position:fixed;inset:0;width:100%;height:100%;border:none">
 </iframe>`;
}

function tick(){
 const diff = targetDate - new Date();
 if(diff <= 0){ apocalypseMode(); return; }
 document.getElementById('days').textContent=Math.floor(diff/86400000);
 document.getElementById('hours').textContent=Math.floor(diff/3600000)%24;
 document.getElementById('minutes').textContent=Math.floor(diff/60000)%60;
 document.getElementById('seconds').textContent=Math.floor(diff/1000)%60;
}
tick();
setInterval(tick,1000);
</script>
</body>
</html>
